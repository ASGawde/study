<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --s1: #141414;
    --s2: #1c1c1c;
    --s3: #242424;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #666;
    --muted2: #444;
    --ml: #00d4aa;
    --dsa: #ff9500;
    --li: #0a8fff;
    --done: #2ecc71;
    --phase1: #00d4aa;
    --phase2: #7c6cfc;
    --phase3: #fc6c8f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    grid-column: 1 / -1;
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--ml);
    letter-spacing: 1px;
  }

  .streak-pill {
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .streak-num {
    color: var(--dsa);
    font-weight: 600;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-global {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .progress-bar-wrap {
    width: 120px;
    height: 4px;
    background: var(--s3);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ml), var(--li));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .today-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--s1);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    padding: 12px 16px 6px;
  }

  .week-group { margin-bottom: 4px; }

  .week-header {
    padding: 6px 16px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: color 0.15s;
  }

  .week-header:hover { color: var(--text); }

  .week-days { display: none; }
  .week-days.open { display: block; }

  .day-item {
    padding: 7px 16px 7px 28px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
    border-left: 2px solid transparent;
    color: var(--muted);
  }

  .day-item:hover { background: var(--s2); color: var(--text); }

  .day-item.active {
    background: var(--s2);
    color: var(--text);
    border-left-color: var(--ml);
  }

  .day-item.completed { color: var(--muted); }

  .day-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .day-item.completed .day-dot { background: var(--done); }
  .day-item.active .day-dot { background: var(--ml); }

  .day-name { flex: 1; font-family: 'IBM Plex Mono', monospace; }

  .day-check {
    font-size: 10px;
    color: var(--done);
    opacity: 0;
  }
  .day-item.completed .day-check { opacity: 1; }

  /* MAIN */
  .main {
    overflow-y: auto;
    padding: 28px 32px;
    background: var(--bg);
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Day header */
  .day-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .day-title-wrap {}

  .day-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .day-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .day-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .day-complete-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--s2);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .day-complete-btn:hover { border-color: var(--done); color: var(--done); }
  .day-complete-btn.done { background: rgba(46,204,113,0.1); border-color: var(--done); color: var(--done); }

  /* Cards */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card.ml::before { background: var(--ml); }
  .card.dsa::before { background: var(--dsa); }
  .card.li::before { background: var(--li); }
  .card.review::before { background: var(--muted); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .card-icon { font-size: 16px; }

  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card.ml .card-label { color: var(--ml); }
  .card.dsa .card-label { color: var(--dsa); }
  .card.li .card-label { color: var(--li); }
  .card.review .card-label { color: var(--muted); }

  .card-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }

  .card-topic {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-items {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .card-items li {
    font-size: 12px;
    color: var(--muted);
    padding-left: 14px;
    position: relative;
    line-height: 1.4;
  }

  .card-items li::before {
    content: '·';
    position: absolute;
    left: 4px;
    color: var(--muted2);
  }

  .card-items li.done-item {
    text-decoration: line-through;
    opacity: 0.4;
  }

  /* Problem list */
  .problem-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .problem-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--s2);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .problem-row:hover { background: var(--s3); }

  .problem-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.15s;
  }

  .problem-row.solved .problem-check {
    background: var(--done);
    border-color: var(--done);
    color: white;
  }

  .problem-name {
    font-size: 12px;
    color: var(--text);
    flex: 1;
  }

  .problem-row.solved .problem-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .problem-diff {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
  }

  .diff-easy { background: rgba(46,204,113,0.12); color: #2ecc71; }
  .diff-med { background: rgba(255,149,0,0.12); color: #ff9500; }
  .diff-hard { background: rgba(255,59,59,0.12); color: #ff3b3b; }

  /* LinkedIn card */
  .li-hook {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
    font-style: italic;
  }

  .li-tip {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .li-tip strong { color: var(--li); }

  /* Full width card */
  .card-full {
    grid-column: 1 / -1;
  }

  /* Phase badge */
  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .phase-badge.p1 { background: rgba(0,212,170,0.1); color: var(--ml); border: 1px solid rgba(0,212,170,0.2); }
  .phase-badge.p2 { background: rgba(124,108,252,0.1); color: #7c6cfc; border: 1px solid rgba(124,108,252,0.2); }
  .phase-badge.p3 { background: rgba(252,108,143,0.1); color: #fc6c8f; border: 1px solid rgba(252,108,143,0.2); }

  /* Review card */
  .review-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .review-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
  }

  /* No day selected */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .empty-icon { font-size: 40px; margin-bottom: 8px; }

  @media (max-width: 700px) {
    body { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
    .sidebar { display: none; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">

  </div>

    <div class="progress-global">
      <span id="progressLabel">0 / 91 days</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>

    <div class="today-label" id="todayLabel"></div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="empty-state">
    <div class="empty-icon">📅</div>
    <div>Select a day to begin</div>

</div>

// ─── UTILS ───────────────────────────────────────────────────────────────────

function getDateForDay(dayIndex) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + dayIndex);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function getDayOfWeek(dayIndex) {
  return getDateForDay(dayIndex).getDay(); // 0=Sun, 6=Sat
}

function getWeekNum(dayIndex) {
  return Math.floor(dayIndex / 7) + 1;
}

function getPhase(dayIndex) {
  const week = getWeekNum(dayIndex);
  if (week <= 3) return { label: 'Phase 1 · Foundations', cls: 'p1' };
  if (week <= 6) return { label: 'Phase 2 · Classical ML', cls: 'p2' };
  if (week <= 10) return { label: 'Phase 3 · Deep Learning', cls: 'p3' };
  return { label: 'Phase 4 · Advanced', cls: 'p3' };
}

function getStreak() {
  let streak = 0;
  for (let i = TOTAL_DAYS - 1; i >= 0; i--) {
    if (completedDays.includes(i)) streak++;
    else if (i < getTodayIndex()) break;
  }
  return streak;
}

function getTodayIndex() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - START_DATE) / 86400000);
  return Math.max(0, Math.min(diff, TOTAL_DAYS - 1));
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = `<div class="sidebar-section-label">// 13 weeks · 91 days</div>`;

  for (let w = 0; w < 13; w++) {
    const weekDays = Array.from({length: 7}, (_, i) => w * 7 + i);
    const allDone = weekDays.every(d => completedDays.includes(d));
    const weekNum = w + 1;
    html += `
      <div class="week-group">
        <div class="week-header" onclick="toggleWeek(${w})">
          <span>Week ${weekNum}</span>
          <span style="font-size:10px">${allDone ? '✓' : ''}</span>
        </div>
        <div class="week-days ${openWeeks.has(w) ? 'open' : ''}" id="week-${w}">
    `;
    weekDays.forEach(d => {
      if (d >= TOTAL_DAYS) return;
      const dow = ['Su','Mo','Tu','We','Th','Fr','Sa'][getDateForDay(d).getDay()];
      const isDone = completedDays.includes(d);
      const isActive = currentDay === d;
      html += `
        <div class="day-item ${isDone ? 'completed' : ''} ${isActive ? 'active' : ''}" onclick="selectDay(${d})" id="day-item-${d}">
          <div class="day-dot"></div>
          <div class="day-name">${dow} · D${d+1}</div>
          <div class="day-check">✓</div>
        </div>
      `;
    });
    html += `</div></div>`;
  }

  sidebar.innerHTML = html;
}

function toggleWeek(w) {
  if (openWeeks.has(w)) {
    openWeeks.delete(w);
  } else {
    openWeeks.add(w);
  }
  renderSidebar();
}

// ─── RENDER MAIN ─────────────────────────────────────────────────────────────

function selectDay(dayIndex) {
  currentDay = dayIndex;
  openWeeks.add(Math.floor(dayIndex / 7));
  renderSidebar();
  renderMain(dayIndex);
  updateTopBar();
}

function renderMain(dayIndex) {
  const ml = ML_TOPICS[dayIndex] || ML_TOPICS[ML_TOPICS.length - 1];
  const dsa = DSA_SCHEDULE[Math.min(dayIndex, DSA_SCHEDULE.length - 1)];
  const li = LINKEDIN_IDEAS[dayIndex] || LINKEDIN_IDEAS[LINKEDIN_IDEAS.length - 1];
  const isDone = completedDays.includes(dayIndex);
  const phase = getPhase(dayIndex);
  const date = getDateForDay(dayIndex);
  const dow = date.toLocaleDateString('en-US', { weekday: 'long' });

  // Review day items
  const reviewDays = [6,13,20,27,34,41,48,55,62,69,76,83,90];
  const isReviewDay = reviewDays.includes(dayIndex);

  const solvedKey = `day-${dayIndex}`;
  const solved = solvedProblems[solvedKey] || [];

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="day-header">
      <div class="day-title-wrap">
        <div class="day-num">Day ${dayIndex + 1} of ${TOTAL_DAYS} · Week ${getWeekNum(dayIndex)}</div>
        <div class="day-title">${dow}</div>
        <div class="day-date">${formatDate(date)}</div>
      </div>
      <button class="day-complete-btn ${isDone ? 'done' : ''}" onclick="toggleDayComplete(${dayIndex})">
        ${isDone ? '✓ Completed' : 'Mark Complete'}
      </button>
    </div>

    <div class="phase-badge ${phase.cls}">${phase.label}</div>

    <div class="cards-grid">
      <!-- ML CARD -->
      <div class="card ml">
        <div class="card-header">
          <div class="card-icon">🧠</div>
          <div class="card-label">ML · Stats · DL</div>
          <div class="card-time">2:00 – 4:00 PM</div>
        </div>
        <div class="card-topic">${ml.topic}</div>
        <ul class="card-items">
          ${ml.items.map(item => `<li>${item}</li>`).join('')}
        </ul>
      </div>

      <!-- DSA CARD -->
      <div class="card dsa">
        <div class="card-header">
          <div class="card-icon">⚡</div>
          <div class="card-label">DSA · ${dsa.pattern}</div>
          <div class="card-time">6:00 – 7:30 PM</div>
        </div>
        <div class="card-topic">${dsa.pattern}</div>
        <div class="problem-list">
          ${dsa.probs.map((p, i) => {
            const pid = `${dayIndex}-${i}`;
            const isSolved = solved.includes(pid);
            return `
              <div class="problem-row ${isSolved ? 'solved' : ''}" onclick="toggleProblem('${pid}', ${dayIndex})">
                <div class="problem-check">${isSolved ? '✓' : ''}</div>
                <div class="problem-name">${p[0]}</div>
                <div class="problem-diff diff-${p[1]}">${p[1]}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- LINKEDIN CARD -->
      <div class="card li">
        <div class="card-header">
          <div class="card-icon">📝</div>
          <div class="card-label">LinkedIn Post</div>
          <div class="card-time">4:00 – 4:15 PM</div>
        </div>
        <div class="card-topic">Today's post idea</div>
        <div class="li-hook">"${li}"</div>
        <div class="li-tip">Write this <strong>right after your study block ends</strong> while it's fresh. 150–250 words max. End with a question to boost comments.</div>
      </div>

      <!-- REVIEW CARD -->
      <div class="card review">
        <div class="card-header">
          <div class="card-icon">🔁</div>
          <div class="card-label">Review · 8:15 – 9:00 PM</div>
        </div>
        <div class="card-topic">${isReviewDay ? 'Weekly Review Day' : 'Evening Review'}</div>
        ${isReviewDay
          ? `<ul class="card-items">
              <li>Redo hardest problem from the week from scratch</li>
              <li>Flashcard review: all concepts this week</li>
              <li>Write down 3 things you'd explain to someone</li>
              <li>Plan next week's focus</li>
            </ul>`
          : `<div class="review-topics">
              ${ml.items.slice(0,2).map(t => `<span class="review-tag">${t.split(':')[0].split('—')[0].trim().substring(0,30)}</span>`).join('')}
              <span class="review-tag">${dsa.pattern}</span>
              <span class="review-tag">flashcards</span>
              <span class="review-tag">interview Qs</span>
            </div>
            <ul class="card-items" style="margin-top:12px">
              <li>Re-explain today's ML concept from memory</li>
              <li>Review any DSA problems you got wrong</li>
              <li>Add 3 new flashcards</li>
            </ul>`
        }
      </div>
    </div>
  `;
}

function toggleDayComplete(dayIndex) {
  if (completedDays.includes(dayIndex)) {
    completedDays = completedDays.filter(d => d !== dayIndex);
  } else {
    completedDays.push(dayIndex);
  }
  saveState();
  renderSidebar();
  renderMain(dayIndex);
  updateTopBar();
}

function toggleProblem(pid, dayIndex) {
  const key = `day-${dayIndex}`;
  if (!solvedProblems[key]) solvedProblems[key] = [];
  if (solvedProblems[key].includes(pid)) {
    solvedProblems[key] = solvedProblems[key].filter(p => p !== pid);
  } else {
    solvedProblems[key].push(pid);
  }
  saveState();
  renderMain(dayIndex);
}

function updateTopBar() {
  const pct = Math.round((completedDays.length / TOTAL_DAYS) * 100);
  document.getElementById('progressLabel').textContent = `${completedDays.length} / ${TOTAL_DAYS} days`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('streakNum').textContent = getStreak();
  document.getElementById('todayLabel').textContent = formatDate(new Date());
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderSidebar();
updateTopBar();

// Auto-select today
const todayIdx = getTodayIndex();
selectDay(todayIdx);
// Scroll to today in sidebar
setTimeout(() => {
  const el = document.getElementById(`day-item-${todayIdx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}, 100);
</script>
</body>
</html>
